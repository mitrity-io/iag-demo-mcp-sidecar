app:
  name: "my-service"
  version: "1.2.0"
  environment: "staging"

database:
  host: "db.internal.example.com"
  port: 5432
  name: "myapp"
  pool_size: 10

redis:
  host: "cache.internal.example.com"
  port: 6379

logging:
  level: "info"
  format: "json"

features:
  enable_notifications: true
  enable_analytics: false
  maintenance_mode: false
